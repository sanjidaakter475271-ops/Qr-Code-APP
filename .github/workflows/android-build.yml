name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/filesystem @capacitor-community/media jspdf

      - name: Build Web Project
        run: npm run build

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Initialize Capacitor Android
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Configure Android SDK Versions
        run: |
          # Overwrite variables.gradle with correct versions
          cat > android/variables.gradle <<'EOF'
          ext {
              minSdkVersion = 28
              compileSdkVersion = 35
              targetSdkVersion = 35
              androidxActivityVersion = '1.9.1'
              androidxAppCompatVersion = '1.7.0'
              androidxCoordinatorLayoutVersion = '1.3.0'
              androidxCoreVersion = '1.13.1'
              androidxFragmentVersion = '1.8.2'
              coreSplashScreenVersion = '1.0.1'
              androidxAnnotationVersion = '1.8.2'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.2.1'
              androidxEspressoCoreVersion = '3.6.1'
              cordovaAndroidVersion = '10.1.1'
          }
          EOF

          # Hardcode SDK values directly in app/build.gradle
          sed -i 's/rootProject.ext.minSdkVersion/28/g' android/app/build.gradle
          sed -i 's/rootProject.ext.compileSdkVersion/35/g' android/app/build.gradle
          sed -i 's/rootProject.ext.targetSdkVersion/35/g' android/app/build.gradle

          # Add required permissions to AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml

      - name: Generate App Icons
        run: |
          npm install -D @capacitor/assets
          npx @capacitor/assets generate --android

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nazu-qr-generator-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
