name: Build Android APK (SDK 21)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/filesystem @capacitor-community/media jspdf

      - name: Build Web Project
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Capacitor Android
        run: |
          # Clean up any partial attempts
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Force SDK 21 and Fix Gradle
        run: |
          # Ensure variables.gradle exists with complete property list
          cat > android/variables.gradle <<EOF
          ext {
              minSdkVersion = 21
              compileSdkVersion = 35
              targetSdkVersion = 35
              androidxActivityVersion = '1.9.1'
              androidxAppCompatVersion = '1.7.0'
              androidxCoordinatorLayoutVersion = '1.3.0'
              androidxCoreVersion = '1.13.1'
              androidxFragmentVersion = '1.8.2'
              coreSplashScreenVersion = '1.0.1'
              androidxAnnotationVersion = '1.8.2'
              junitVersion = '4.13.2'
              androidxJunitVersion = '1.2.1'
              androidxEspressoCoreVersion = '3.6.1'
              cordovaAndroidVersion = '10.1.1'
          }
          EOF

          # Sometimes Capacitor 6/7 settings.gradle needs a fix in CI
          if [ ! -f "android/settings.gradle" ]; then
            echo "include ':app'" > android/settings.gradle
          fi

          # Patch app/build.gradle to ensure it uses the variables and doesn't crash
          # Replace rootProject.ext calls with hardcoded values if rootProject is null
          sed -i 's/rootProject.ext.minSdkVersion/21/g' android/app/build.gradle
          sed -i 's/rootProject.ext.compileSdkVersion/35/g' android/app/build.gradle
          sed -i 's/rootProject.ext.targetSdkVersion/35/g' android/app/build.gradle

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qr-generator-sdk21-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
