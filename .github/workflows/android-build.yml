name: Build Android APK (SDK 21)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/filesystem @capacitor-community/media jspdf

      - name: Build Web Project
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Initialize Capacitor Android
        run: |
          npx cap add android
          npx cap sync android

      - name: Force SDK 21 Configuration
        run: |
          # Patch variables.gradle to ensure minSdk is 21
          # Capacitor's default is often higher, so we explicitly force it.
          if [ -f "android/variables.gradle" ]; then
            sed -i 's/minSdkVersion = .*/minSdkVersion = 21/g' android/variables.gradle
          fi
          # Also ensure it's set in build.gradle just in case
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/minSdkVersion [0-9]*/minSdkVersion 21/g' android/app/build.gradle
          fi

      - name: Build APK (Debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qr-generator-sdk21-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
